# Curated clade data for the Deep Time timeline.
#
# This file follows the first clade data model described in
# docs/deep_time_clades_implementation_plan.md:
#
#   id, label, scientific_rank, parent_id, start_ma, end_ma, range_note,
#   confidence, display_groups, display_priority, min_zoom_level,
#   short_description, representative_taxa, extinction_note, tags
#
# It also includes forward-looking cladistics fields used by
# docs/cladistics_column_implementation_plan.md:
#
#   divergence_ma, branch_priority, cladistic_role, uncertainty
#
# The current Dart parser ignores the forward-looking fields, so they are safe
# to add now while keeping the data ready for the next cladistics layout work.

